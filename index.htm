<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مسابقة موهوب</title>
    <!-- استدعاء بوتستراب للتنسيق السريع -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <!-- استدعاء خط Cairo من جوجل -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="#">موهوب</a>
        </div>
    </nav>

    <header class="hero-section text-center">
        <div class="container">
            <h1 class="display-4 fw-bold">مرحباً بك في مسابقة موهوب</h1>
            <p class="lead">اكتشف قدراتك وابدأ رحلتك العلمية معنا</p>
            <a href="#register" class="btn btn-primary btn-lg">سجل الآن</a>
        </div>
    </header>

    <section id="features" class="py-5">
        <div class="container text-center">
            <div class="row">
                <div class="col-md-4">
                    <div class="card p-4">
                        <h3>الرياضيات</h3>
                        <p>تحديات ممتعة في عالم الأرقام.</p>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card p-4">
                        <h3>العلوم</h3>
                        <p>استكشف أسرار الكون والطبيعة.</p>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card p-4">
                        <h3>المعلوماتية</h3>
                        <p>خطوتك الأولى في عالم البرمجة.</p>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <section id="register" class="py-5 bg-light">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow p-4">
                    <h2 class="text-center mb-4">نموذج التسجيل في المسابقة</h2>
                    <form id="registrationForm">
                        <div class="mb-3">
                            <label for="fullName" class="form-label">الاسم بالكامل</label>
                            <input type="text" class="form-control" id="fullName" required placeholder="أدخل اسمك الثلاثي">
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">البريد الإلكتروني</label>
                            <input type="email" class="form-control" id="email" required placeholder="name@example.com">
                        </div>
                        <div class="mb-3">
                            <label for="subject" class="form-label">المسار المختار</label>
                            <select class="form-select" id="subject" required>
                                <option value="" selected disabled>اختر المسار...</option>
                                <option value="math">الرياضيات</option>
                                <option value="science">العلوم</option>
                                <option value="it">المعلوماتية</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 btn-lg">إرسال الطلب</button>
                    </form>
                    <div id="responseMessage" class="mt-3 text-center d-none"></div>
                </div>
            </div>
        </div>
    </div>
</section>

    <footer class="text-center py-4">
        <p>جميع الحقوق محفوظة لعام 2026</p>
    </footer>
<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycby3aGxY8S0M7JK3QN63M8dyWGO3zq0hk_-TXdONO5Abk2okmZJFNSTZlaQleRCwleqk5Q/exec'; // استبدل ده برابط الاندبوينت بتاعك
    const form = document.getElementById('registrationForm');

    form.addEventListener('submit', e => {
        e.preventDefault();
        
        // تجهيز البيانات
        const formData = {
            fullName: document.getElementById('fullName').value,
            email: document.getElementById('email').value,
            subject: document.getElementById('subject').value
        };

        // إرسال البيانات للاندبوينت
      fetch(scriptURL, {
  method: 'POST',
  mode: 'no-cors', // جرب تضيف السطر ده لو ظهر لك خطأ CORS
  cache: 'no-cache',
  headers: {
    'Content-Type': 'application/json',
  },
  body: JSON.stringify(formData)
})
       
        .then(response => {
            const responseDiv = document.getElementById('responseMessage');
            responseDiv.classList.remove('d-none');
            responseDiv.classList.add('alert', 'alert-success');
            responseDiv.innerHTML = "تم التسجيل بنجاح في جدول البيانات!";
            form.reset();
        })
        .catch(error => console.error('Error!', error.message));
    });
</script>
</body>
</html>
